<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Climbing AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://docs.opencv.org/4.x/opencv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex.js"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" />
</head>
<body>
    <video id="webcam-video" class="input_video" autoplay playsinline muted></video>
    
    <canvas id="detection-canvas" class="output_canvas"></canvas>

    <div id="loading-overlay">
        <div class="loader-content">
            <span class="material-symbols-rounded loadingIcon">sync</span>
            <h2 class="headerFont">INITIALIZING CAMERA</h2>
            <p class="subFont" id="loading-status">Loading OpenCV & Pose Models...</p>
        </div>
    </div>

    <div id="app-viewport">
        
        <header class="topBar">
            <span class="headerFont" id="climbName">DETECTION</span>
            
            <div class="topBarGroup">
                <div class="dropDownContainer">
                    <select id="gridSize" class="dropDown textFont">
                        <option value="30">30</option>
                        <option value="35">35</option>
                        <option value="40">40</option>
                        <option value="45">45</option>
                        <option value="50" selected>50</option>
                        <option value="55">55</option>
                        <option value="60">60</option>
                    </select>
                    <span class="material-symbols-rounded dropDownIcon">expand_more</span>
                </div>

                <button class="btn bluetoothIcon" onclick="connectBLE()">
                    <span class="material-symbols-rounded">bluetooth</span>
                </button>
            </div>
        </header>

        <div class="detection-sub-bar">
            <!-- <button id="resetBtn" class="sub-btn">
                <span class="material-symbols-rounded" style="color:white;">reset_exposure</span>
            </button> -->
            <button id="routeBtn" class="sub-btn">
                <span class="material-symbols-rounded" style="color:white;">route</span>
            </button>
            <button id="startBtn" class="btn mainActionButton">
            </button>
            <button id="modeToggleBtn" class="sub-btn">
                <span class="material-symbols-rounded" style="color:white;">my_location</span>
            </button>
        </div>

        <nav class="bottomBar">
            <button class="nav-item climbsIcon" onclick="location.href = 'climbs.html'">
                <span class="material-symbols-rounded">cards_star</span>
            </button>

            <button class="nav-item navBtnActive detectionIcon" onclick="location.href = 'index.html'">
                <span class="material-symbols-rounded" style="color:var(--mainColor);">photo_camera</span>
            </button>

            <button class="nav-item profileIcon" onclick="location.href = 'profile.html'">
                <span class="material-symbols-rounded">account_circle</span>
            </button>
        </nav>
    </div>

    <div id="saveModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-title">CLIMB COMPLETE</div>
            <div id="modalStats" class="modal-text">
                </div>
            
            <input type="text" id="climbNameInput" class="modal-input" placeholder="Name your climb...">
            
            <div class="modal-actions">
                <button type="button" id="cancelSave" class="modal-btn secondary">DISCARD</button>
                <button type="button" id="confirmSave" class="modal-btn primary">SAVE & REPLAY</button>
            </div>
        </div>
    </div>

    <div id="routeModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-title">SELECT ROUTE</div>
            <div class="modal-text">Pick a route to follow or climb freely.</div>
            
            <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 15px;">
                <input type="text" id="routeSearch" class="modal-input" placeholder="Search routes..." style="margin-bottom: 0; flex: 1; padding: 10px;">
                <button id="sortToggle" class="modal-btn primary" style="width: 50px; flex: none; height: 42px; border-radius: 12px;">
                    <span class="material-symbols-rounded">sort</span>
                </button>
            </div>

            <div id="routeList" style="flex-grow: 1; overflow-y: auto; margin-bottom: 20px; border-radius: 15px;">
                </div>

            <div class="modal-actions">
                <button id="closeRouteModal" class="modal-btn secondary">CANCEL</button>
                <button id="noRouteBtn" class="modal-btn primary" style="background: #444;">FREE CLIMB</button>
            </div>
        </div>
    </div>

    <div id="twinModal" class="modal-overlay hidden">
        <div class="modal-content" style="border-top: 5px solid var(--digitalTwinColor);">
            <div class="modal-title">COACHING</div>
            <div class="modal-text">AI is processing your last attempt...</div>
            <div class="modal-actions">
                <button id="confirmTwin" class="modal-btn primary" style="background: var(--digitalTwinColor);">
                    GOT IT
                </button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script src="detection.js"></script>

    <script>
        (function forceClear() {
            const loader = document.getElementById("loading-overlay");
            if (loader) {
                // Fallback: clear loader after 6s regardless
                setTimeout(() => { 
                    loader.style.opacity = "0"; 
                    setTimeout(() => { loader.style.display = "none"; }, 500);
                }, 6000);
            }
        })();

        window.addEventListener('load', () => {
            // Wait for the MediaPipe/OpenCV loop to start
            const checkAI = setInterval(() => {
                if (typeof firstFrameReceived !== 'undefined' && firstFrameReceived === true) {
                    
                    // Now that AI is running, load the route (or twin) from URL
                    if (typeof loadRouteFromParams === "function") {
                        loadRouteFromParams();
                    }

                    clearInterval(checkAI);
                    
                    // Snappy hide of the loader
                    const loader = document.getElementById("loading-overlay");
                    if (loader) {
                        loader.style.opacity = "0";
                        setTimeout(() => { loader.style.display = "none"; }, 500);
                    }
                }
            }, 200);
        });
    </script>
    
    
</body>
</html>
