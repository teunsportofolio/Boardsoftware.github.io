<!DOCTYPE html>
<html>
<head>
  <title>Climb Replay</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/styles.css">

  <style>
    .output_canvas {
        position: absolute;       /* or fixed */
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        }

    #replayBar, #replayPanel, #currentMovePanel {
        position: fixed;
        z-index: 2000; /* above canvas */
        }

    #replayPanel {
        position: fixed;
        z-index: 10; /* above canvas */
        }
  </style>
</head>

<body>
  <!-- REPLAY BACKGROUND PANEL -->
  <div id="replayPanel"></div>

  <canvas class="output_canvas"></canvas>

  <!-- REPLAY BOTTOM BAR -->
  <div id="replayBar" class="bottom-controls controls" style="transform: translate(-50%, 120%); display:none;">
    <input type="range" id="replaySlider" min="0" max="0" value="0" step="1">
    <button id="replayResetBtn">NEW CLIMB</button>
    <button id="profileBtn">PROFILE</button>
  </div>

  <div id="currentMovePanel" style="display:none;">
    <div>Hand: <span id="panelHand"></span></div>
    <div>Row: <span id="panelRow"></span></div>
    <div>Col: <span id="panelCol"></span></div>
    <div style="margin-top:5px;">Duration: <span id="panelDuration"></span> ms</div>
    
    <!-- Image indicator -->
    <div id="durationImageContainer" style="position: relative; width:50px; height:50px;">
      <img id="durationBg" src="images/bg.png" style="width:100%; height:100%; object-fit:contain;">
      <img id="durationOverlay" src="" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity 0.2s ease;">
    </div>
  </div>

  <script type="module" src="js/replay.js" defer></script>

</body>
</html>
